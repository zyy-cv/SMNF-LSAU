train_dataset:
  dataset:
    name: image-folder
    args:
      root_path: /home/ps/zwn_second/Datasets/DIV2K/HR
      #root_path: /home/tata/tata/F/zyy/Dataset/DIV2K/HR2
      #root_path: G:/DIV2K/HR
      repeat: 20
      cache: in_memory
  wrapper:
    name: sr-implicit-downsampled
    args:
      inp_size: 48
#      scale_min: [1]
#      scale_max: [4]
      scale_min: [1]
      scale_max: [16]
      augment: true
      sample_q: 2304
  batch_size: 8 #16

val_dataset:
  dataset:
    name: image-folder
    args:
      root_path: /home/ps/zwn_second/Datasets/DIV2K_valid/HR
      #root_path:  /home/tata/tata/F/zyy/Dataset/DIV2K_valid/HR2
      #root_path: G:/DIV2K/DIV2K_valid_HR
      first_k: 10
      repeat: 160
      cache: in_memory
  wrapper:
    name: sr-implicit-downsampled
    args:
      inp_size: 48
#      scale_min: [1]
#      scale_max: [4]
      scale_min: [1]
      scale_max: [8]
      sample_q: 2304
  batch_size: 8 #16

data_norm:
  inp: {sub: [0.5], div: [0.5]}
  gt: {sub: [0.5], div: [0.5]}

model:
  name: IDASR
  #name: liif_fnl
  #name: DefoemableAtt
  args:
    encoder_spec:
      name: edsr-baseline
      args:
        no_upsampling: true
    imnet_spec:
      name: mlp
      args:
        out_dim: 3
        hidden_list: [256, 256, 256, 256]

optimizer:
  name: adam
  args:
    lr: 1.e-4
epoch_max: 1000
multi_step_lr:
  milestones: [200, 400, 600, 800]
  gamma: 0.5

epoch_val: 1000 #1
epoch_save: 20 #10
